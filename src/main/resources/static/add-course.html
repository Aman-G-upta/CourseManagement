
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Add Course</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg modern-nav">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand">📘 CourseFlow</span>

        <div class="nav-menu">
            <a href="index.html" class="nav-link">Home</a>
            <a href="add-course.html" class="nav-link">Add Course</a>
            <a href="courses.html" class="nav-link">Courses</a>
        </div>
    </div>
</nav>

<div class="form-section">
    <div class="form-card">
        <h3>Add New Course</h3>

        <input class="form-control modern-input" id="title" placeholder="Course Title">
        <input class="form-control modern-input" id="instructor" placeholder="Instructor">
        <input class="form-control modern-input" id="fee" placeholder="Fee">
        <input class="form-control modern-input" id="duration" placeholder="Duration">
        <input class="form-control modern-input" id="image" placeholder="Course Image URL">

        <button class="btn modern-btn w-100 mt-3" onclick="addCourse()">Add Course</button>
    </div>
</div>

<script src="script.js"></script>
<script>
    window.onload = function(){

    let data = localStorage.getItem("editCourse");

    if(data){
    let c = JSON.parse(data);

    document.getElementById("title").value = c.title;
    document.getElementById("instructor").value = c.instructor;
    document.getElementById("fee").value = c.fee;
    document.getElementById("duration").value = c.duration;
    document.getElementById("image").value = c.image;

    window.editId = c.id;
    }
    }
</script>

</body>
</html>
